packages:
  - "apps/*"
  - "packages/*"

# Centralized dependency versions shared across workspace packages.
# Consumers reference these with the "catalog:" protocol in their package.json,
# so a shared dependency only needs to be bumped in one place.
catalog:
  axios: "^1.16.1"
  "@supabase/supabase-js": "^2.97.0"

allowBuilds:
  '@parcel/watcher': true
  es5-ext: true
  sharp: true
  tesseract.js: true
  unrs-resolver: true

overrides:
  axios: "1.16.1"
  follow-redirects: "1.16.0"
  postcss: "8.5.15"
  brace-expansion: "5.0.6"
  tmp: "0.2.7"
  uuid: "11.1.1"
  "@xmldom/xmldom": "0.8.13"
